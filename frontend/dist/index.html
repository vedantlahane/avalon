    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #F9FAFB;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        background-color: #4F46E5;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 40px;
        box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.2);
        animation: pulse 2s infinite ease-in-out;
      }
      .loader-text {
        margin-top: 32px;
        font-family: sans-serif;
        font-weight: 600;
        color: #111827;
        font-size: 18px;
      }
      .loader-progress {
        margin-top: 16px;
        width: 200px;
        height: 6px;
        background-color: #E5E7EB;
        border-radius: 9999px;
        overflow: hidden;
        position: relative;
      }
      .loader-bar {
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #4F46E5, transparent);
        animation: loading 2s infinite linear;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.2); }
        50% { transform: scale(1.1); box-shadow: 0 25px 30px -5px rgba(79, 70, 229, 0.3); }
      }
      @keyframes loading {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      body.dark #initial-loader {
        background-color: #0F172A;
      }
      body.dark .loader-text {
        color: #F1F5F9;
      }
      body.dark .loader-logo {
        background-color: #818CF8;
        box-shadow: 0 0 25px rgba(129, 140, 248, 0.1);
      }
    </style>

    <style>
        #vite-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #vite-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #vite-loader .loader {
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            color: gray;
            stroke: gray;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

  <body>
    <div id="initial-loader">
      <div class="loader-logo">N</div>
      <div class="loader-text">NexusCRM AI</div>
      <div class="loader-progress">
        <div class="loader-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Auto-hide loader when app is ready
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }, 1000);
        }
      });
      // Set initial theme to avoid flash
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.body.classList.add('dark');
    </script>
    <script>
        (() => {
            const createLoader = () => {
                let loader = document.getElementById("vite-loader");
                if (loader) return loader;

                loader = document.createElement("div");
                loader.id = "vite-loader";
                
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("class", "loader medium");
                svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                svg.setAttribute("viewBox", "0 0 24 24");
                svg.setAttribute("fill", "none");
                svg.setAttribute("stroke", "currentColor");
                svg.setAttribute("stroke-width", "2");
                svg.setAttribute("stroke-linecap", "round");
                svg.setAttribute("stroke-linejoin", "round");
                
                const paths = [
                    { d: "M12 2v4" },
                    { d: "m16.2 7.8 2.9-2.9" },
                    { d: "M18 12h4" },
                    { d: "m16.2 16.2 2.9 2.9" },
                    { d: "M12 18v4" },
                    { d: "m4.9 19.1 2.9-2.9" },
                    { d: "M2 12h4" },
                    { d: "m4.9 4.9 2.9 2.9" }
                ];
                
                paths.forEach(pathData => {
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", pathData.d);
                    svg.appendChild(path);
                });
                
                loader.appendChild(svg);
                document.body.appendChild(loader);
                
                return loader;
            }

            const removeLoader = () => {
                const loader = document.getElementById("vite-loader");
                if (loader) {
                    loader.classList.add('hidden');
                    setTimeout(() => {
                        if (loader.parentNode) {
                            loader.parentNode.removeChild(loader);
                        }
                    }, 100);
                }
            }

            // Create loader immediately
            if (document.body) {
                createLoader();
            } else {
                document.addEventListener('DOMContentLoaded', createLoader);
            }

            // Remove loader when page is fully loaded
            if (document.readyState === 'complete') {
                removeLoader();
            } else {
                window.addEventListener('load', removeLoader);
            }
        })()
    </script>
    <script>
    (function() {
      function createWatermark() {

        wm = document.createElement("a");

        wm.appendChild(txtBuild);

        document.body.appendChild(wm);

      // Create watermark initially
      createWatermark();

      // Observe DOM and re-create if removed
      const observer = new MutationObserver(() => {
        if (!document.getElementById("built_with_uptiq__attribution")) {
          createWatermark();
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
