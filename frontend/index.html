<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusCRM AI | AI-Powered Sales Intelligence</title>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #F9FAFB;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        background-color: #4F46E5;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 40px;
        box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.2);
        animation: pulse 2s infinite ease-in-out;
      }
      .loader-text {
        margin-top: 32px;
        font-family: sans-serif;
        font-weight: 600;
        color: #111827;
        font-size: 18px;
      }
      .loader-progress {
        margin-top: 16px;
        width: 200px;
        height: 6px;
        background-color: #E5E7EB;
        border-radius: 9999px;
        overflow: hidden;
        position: relative;
      }
      .loader-bar {
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #4F46E5, transparent);
        animation: loading 2s infinite linear;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.2); }
        50% { transform: scale(1.1); box-shadow: 0 25px 30px -5px rgba(79, 70, 229, 0.3); }
      }
      @keyframes loading {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      body.dark #initial-loader {
        background-color: #0F172A;
      }
      body.dark .loader-text {
        color: #F1F5F9;
      }
      body.dark .loader-logo {
        background-color: #818CF8;
        box-shadow: 0 0 25px rgba(129, 140, 248, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-logo">N</div>
      <div class="loader-text">NexusCRM AI</div>
      <div class="loader-progress">
        <div class="loader-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Auto-hide loader when app is ready
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }, 1000);
        }
      });
      // Set initial theme to avoid flash
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.body.classList.add('dark');
    </script>
  </body>
</html>
